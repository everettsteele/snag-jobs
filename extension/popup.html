<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 320px; background: #fff; color: #1F2D3D; }
.header { background: #1F2D3D; padding: 14px 16px; display: flex; align-items: center; gap: 8px; }
.header svg { color: #F97316; flex-shrink: 0; }
.header h1 { color: #fff; font-size: 15px; font-weight: 700; }
.body { padding: 16px; }
.setup { text-align: center; padding: 20px 16px; }
.setup p { font-size: 13px; color: #6B7280; margin-bottom: 12px; }
.input { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 7px; font-size: 13px; outline: none; margin-bottom: 8px; }
.input:focus { border-color: #F97316; }
.btn { width: 100%; padding: 9px; background: #F97316; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:hover { background: #ea6c06; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-outline { background: #fff; color: #6B7280; border: 1px solid #E5E7EB; }
.btn-outline:hover { background: #F9FAFB; color: #1F2D3D; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.detected { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
.detected-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.detected-sub { font-size: 11px; color: #6B7280; }
.success { text-align: center; padding: 24px 16px; }
.success svg { margin-bottom: 8px; }
.success p { font-size: 14px; font-weight: 600; color: #10B981; }
.success .sub { font-size: 12px; color: #9CA3AF; margin-top: 4px; font-weight: 400; }
.error { color: #EF4444; font-size: 12px; margin-top: 6px; display: none; }
.status { font-size: 11px; color: #9CA3AF; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="header">
  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  <h1>HopeSpot</h1>
</div>

<div class="body">
  <!-- Setup view: enter HopeSpot URL and log in -->
  <div id="setup-view" style="display:none">
    <div class="setup">
      <p>Connect to your HopeSpot instance.</p>
      <div class="field">
        <label>HopeSpot URL</label>
        <input type="url" id="server-url" class="input" placeholder="https://your-app.railway.app">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="setup-email" class="input" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="setup-password" class="input" placeholder="Password">
      </div>
      <button class="btn" id="setup-btn" onclick="doSetup()">Connect</button>
      <div class="error" id="setup-error"></div>
    </div>
  </div>

  <!-- Snag view: shows detected job info and snag button -->
  <div id="snag-view" style="display:none">
    <div class="detected" id="detected-info">
      <div class="detected-title" id="det-title">Loading...</div>
      <div class="detected-sub" id="det-url"></div>
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="snag-company" class="input" placeholder="Company name">
    </div>
    <div class="field">
      <label>Role</label>
      <input type="text" id="snag-role" class="input" placeholder="Role title">
    </div>
    <div class="field">
      <label>Notes</label>
      <input type="text" id="snag-notes" class="input" placeholder="Optional notes">
    </div>
    <button class="btn" id="snag-btn" onclick="doSnag()">Snag to HopeSpot</button>
    <div class="error" id="snag-error"></div>
    <div class="status"><a href="#" id="open-app" style="color:#F97316;text-decoration:none;font-weight:600">Open HopeSpot</a> &nbsp;&middot;&nbsp; <a href="#" onclick="disconnect()" style="color:#9CA3AF;text-decoration:none">Disconnect</a></div>
  </div>

  <!-- Success view -->
  <div id="success-view" style="display:none">
    <div class="success">
      <svg width="32" height="32" fill="#10B981" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <p>Snagged!</p>
      <p class="sub" id="success-msg">Added to your application queue.</p>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
