<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruiter Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --blue-bg: #e6f1fb; --blue-text: #0c447c;
    --green-bg: #eaf3de; --green-text: #27500a;
    --gray-bg: #f1efe8; --gray-text: #444441;
    --amber-bg: #faeeda; --amber-text: #633806;
    --red-bg: #fcebeb; --red-text: #791f1f;
    --teal-bg: #e1f5ee; --teal-text: #085041;
    --purple-bg: #f0ebfc; --purple-text: #4a1a8c;
    --overdue-border: #ba7517;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #e8e6df; --text2: #a8a69f; --text3: #6e6c67;
      --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
      --blue-bg: #042c53; --blue-text: #b5d4f4;
      --green-bg: #173404; --green-text: #c0dd97;
      --gray-bg: #2c2c2a; --gray-text: #d3d1c7;
      --amber-bg: #412402; --amber-text: #fac775;
      --red-bg: #501313; --red-text: #f7c1c1;
      --teal-bg: #04342c; --teal-text: #9fe1cb;
      --purple-bg: #2a1050; --purple-text: #d0b0f8;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; line-height: 1.5; }
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 32px; width: 320px; }
  .login-box h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
  .login-box input { width: 100%; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; background: var(--bg2); color: var(--text); margin-bottom: 10px; }
  .login-box input:focus { outline: none; border-color: var(--text3); }
  .login-box button { width: 100%; font-size: 13px; padding: 8px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-weight: 500; }
  .login-error { font-size: 12px; color: var(--red-text); margin-bottom: 8px; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 15px; font-weight: 500; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .header-btn { font-size: 11px; padding: 4px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; text-decoration: none; display: inline-block; }
  .header-btn:hover { background: var(--bg2); color: var(--text); }
  .main { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 500; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; }
  .filter-btn.active, .filter-btn:hover { background: var(--bg2); color: var(--text); }
  .add-btn { margin-left: auto; font-size: 12px; padding: 5px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--text); color: var(--bg); cursor: pointer; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px; }
  .card.overdue { border-color: var(--overdue-border); }
  .card-head { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .card-head:hover { background: var(--bg2); }
  .firm-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .firm-name { font-weight: 500; font-size: 14px; }
  .tier-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
  .t1 { background: var(--blue-bg); color: var(--blue-text); }
  .t2 { background: var(--green-bg); color: var(--green-text); }
  .t3 { background: var(--gray-bg); color: var(--gray-text); }
  .overdue-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--amber-bg); color: var(--amber-text); }
  .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .s-not { background: var(--gray-bg); color: var(--gray-text); }
  .s-contacted { background: var(--blue-bg); color: var(--blue-text); }
  .s-conversation { background: var(--amber-bg); color: var(--amber-text); }
  .s-placed { background: var(--teal-bg); color: var(--teal-text); }
  .s-passed { background: var(--red-bg); color: var(--red-text); }
  .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .card-body { display: none; border-top: 0.5px solid var(--border); }
  .card-body.open { display: block; }
  .card-section { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  .card-section:last-child { border-bottom: none; }
  .section-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; font-weight: 500; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .field-val { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .link-btn { font-size: 11px; padding: 3px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); text-decoration: none; cursor: pointer; }
  .link-btn:hover { background: var(--bg2); }
  .status-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .status-opt { font-size: 12px; padding: 4px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .status-opt:hover { background: var(--bg2); }
  .status-opt.selected { border-color: var(--border2); font-weight: 500; color: var(--text); background: var(--bg2); }
  .notes-area { width: 100%; margin-top: 8px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 10px; background: var(--bg2); color: var(--text); resize: vertical; min-height: 56px; }
  .notes-area:focus { outline: none; border-color: var(--border2); }
  .followup-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .followup-row label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .followup-row input[type=date] { font-size: 12px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 8px; background: var(--bg2); color: var(--text); }

  /* Contacts */
  .contacts-list { display: flex; flex-direction: column; gap: 8px; }
  .contact-row { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .contact-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; }
  .contact-head:hover { background: var(--bg2); }
  .contact-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text3); flex-shrink: 0; }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 13px; font-weight: 500; }
  .contact-title { font-size: 11px; color: var(--text3); }
  .contact-status-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .cs-not { background: var(--gray-bg); color: var(--gray-text); }
  .cs-emailed { background: var(--blue-bg); color: var(--blue-text); }
  .cs-linkedin { background: var(--purple-bg); color: var(--purple-text); }
  .cs-responded { background: var(--green-bg); color: var(--green-text); }
  .cs-conversation { background: var(--amber-bg); color: var(--amber-text); }
  .cs-dead { background: var(--red-bg); color: var(--red-text); }
  .contact-actions { display: flex; gap: 4px; }
  .contact-icon-btn { font-size: 11px; padding: 3px 8px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; text-decoration: none; line-height: 1.4; }
  .contact-icon-btn:hover { background: var(--bg2); color: var(--text); }
  .contact-detail { display: none; padding: 10px 12px; border-top: 0.5px solid var(--border); background: var(--bg2); }
  .contact-detail.open { display: block; }
  .contact-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
  .contact-input { width: 100%; font-size: 12px; font-family: inherit; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 8px; background: var(--bg); color: var(--text); }
  .contact-input:focus { outline: none; border-color: var(--border2); }
  .contact-status-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
  .contact-status-opt { font-size: 11px; padding: 3px 10px; border-radius: var(--radius); border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .contact-status-opt.selected { border-color: var(--border2); font-weight: 500; background: var(--bg); color: var(--text); }
  .contact-notes { width: 100%; font-size: 12px; font-family: inherit; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 8px; background: var(--bg); color: var(--text); resize: vertical; min-height: 48px; margin-top: 4px; }
  .contact-notes:focus { outline: none; border-color: var(--border2); }
  .contact-detail-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-save-contact { font-size: 12px; padding: 5px 12px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-weight: 500; }
  .btn-delete-contact { font-size: 12px; padding: 5px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--red-text); cursor: pointer; }
  .add-contact-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius); border: 0.5px dashed var(--border2); background: transparent; color: var(--text3); cursor: pointer; margin-top: 8px; width: 100%; text-align: left; }
  .add-contact-btn:hover { background: var(--bg2); color: var(--text); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; width: 520px; max-width: calc(100vw - 32px); border: 0.5px solid var(--border2); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal input, .modal select, .modal textarea { width: 100%; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 10px; background: var(--bg2); color: var(--text); margin-bottom: 10px; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--text3); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .btn-cancel { font-size: 13px; padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; }
  .btn-save { font-size: 13px; padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-weight: 500; }
  .import-hint { font-size: 11px; color: var(--text3); margin-bottom: 10px; line-height: 1.5; }
  .import-result { font-size: 13px; color: var(--green-text); margin-top: 8px; }
  @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } .two-col { grid-template-columns: 1fr; } .contact-detail-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="login-screen" id="login-screen" style="display:none">
  <div class="login-box">
    <h2>Recruiter Tracker</h2>
    <div class="login-error" id="login-error" style="display:none">Wrong password</div>
    <input type="password" id="login-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <h1>Recruiter Tracker</h1>
  <div class="header-actions">
    <span id="overdue-count" style="font-size:12px;color:var(--amber-text);display:none"></span>
    <a class="header-btn" onclick="exportCSV()">Export CSV</a>
    <a class="header-btn" onclick="openImport()">Import CSV</a>
  </div>
</header>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="controls">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="not contacted">Not contacted</button>
    <button class="filter-btn" data-filter="contacted">Contacted</button>
    <button class="filter-btn" data-filter="in conversation">In conversation</button>
    <button class="filter-btn" data-filter="overdue">Overdue</button>
    <button class="add-btn" onclick="openModal()">+ Add firm</button>
  </div>
  <div id="cards"></div>
</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add a firm</h2>
    <input type="text" id="m-name" placeholder="Firm name" />
    <select id="m-tier">
      <option value="1">Tier 1 - Priority</option>
      <option value="2">Tier 2 - Secondary</option>
      <option value="3" selected>Tier 3 - Opportunistic</option>
    </select>
    <textarea id="m-why" rows="2" placeholder="Why you fit (optional)"></textarea>
    <input type="text" id="m-website" placeholder="Website URL (optional)" />
    <input type="text" id="m-linkedin" placeholder="LinkedIn URL (optional)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addFirm()">Add firm</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h2>Import CSV</h2>
    <p class="import-hint">Paste CSV rows. Required column: <strong>name</strong>. Optional: tier, why, website, linkedin, notes, status, followup_date. Existing firms matched by name will be updated.</p>
    <textarea id="import-text" rows="8"></textarea>
    <div class="import-result" id="import-result" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeImport()">Cancel</button>
      <button class="btn-save" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<script>
let firms = [];
let activeFilter = 'all';
let authToken = localStorage.getItem('rt-token') || '';

const FIRM_STATUS = {
  'not contacted':   { label: 'Not contacted',  cls: 's-not' },
  'contacted':       { label: 'Contacted',       cls: 's-contacted' },
  'in conversation': { label: 'In conversation', cls: 's-conversation' },
  'placed':          { label: 'Placed',          cls: 's-placed' },
  'passed':          { label: 'Passed',          cls: 's-passed' },
};

const CONTACT_STATUS = {
  'not contacted': { label: 'Not contacted', cls: 'cs-not' },
  'emailed':       { label: 'Emailed',       cls: 'cs-emailed' },
  'linkedin sent': { label: 'LinkedIn sent', cls: 'cs-linkedin' },
  'responded':     { label: 'Responded',     cls: 'cs-responded' },
  'in conversation': { label: 'In conversation', cls: 'cs-conversation' },
  'dead end':      { label: 'Dead end',      cls: 'cs-dead' },
};

function authHeaders() { return { 'Content-Type': 'application/json', 'x-auth-token': authToken }; }

async function init() {
  const r = await fetch('/api/auth-required');
  const { required } = await r.json();
  if (!required) { authToken = 'no-auth'; showApp(); }
  else if (authToken) {
    const test = await fetch('/api/firms', { headers: { 'x-auth-token': authToken } });
    if (test.ok) showApp(); else { authToken = ''; showLogin(); }
  } else showLogin();
}

function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
function showApp() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'block'; load(); }

async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
  if (r.ok) {
    const { token } = await r.json();
    authToken = token; localStorage.setItem('rt-token', token);
    document.getElementById('login-error').style.display = 'none';
    showApp();
  } else { document.getElementById('login-error').style.display = 'block'; }
}

async function load() {
  const r = await fetch('/api/firms', { headers: authHeaders() });
  firms = await r.json();
  render();
}

async function patchFirm(id, payload) { await fetch('/api/firms/' + id, { method: 'PATCH', headers: authHeaders(), body: JSON.stringify(payload) }); }
async function patchContact(fid, cid, payload) { await fetch('/api/firms/' + fid + '/contacts/' + cid, { method: 'PATCH', headers: authHeaders(), body: JSON.stringify(payload) }); }
async function deleteContact(fid, cid) { await fetch('/api/firms/' + fid + '/contacts/' + cid, { method: 'DELETE', headers: authHeaders() }); }
async function addContact(fid, payload) { const r = await fetch('/api/firms/' + fid + '/contacts', { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) }); return r.json(); }

function isOverdue(f) { if (!f.followup_date) return false; return new Date(f.followup_date) < new Date(new Date().toDateString()); }

function filtered() {
  if (activeFilter === 'all') return firms;
  if (activeFilter === 'overdue') return firms.filter(isOverdue);
  return firms.filter(f => f.status === activeFilter);
}

function render() { renderStats(); renderCards(); }

function renderStats() {
  const total = firms.length;
  const contacted = firms.filter(f => f.status !== 'not contacted').length;
  const active = firms.filter(f => f.status === 'in conversation').length;
  const totalContacts = firms.reduce((sum, f) => sum + (f.contacts || []).length, 0);
  const overdue = firms.filter(isOverdue).length;
  document.getElementById('stats').innerHTML =
    stat('Firms tracked', total) + stat('Contacted', contacted) + stat('In conversation', active) + stat('People tracked', totalContacts);
  const oc = document.getElementById('overdue-count');
  if (overdue > 0) { oc.style.display = 'inline'; oc.textContent = overdue + ' follow-up' + (overdue > 1 ? 's' : '') + ' overdue'; }
  else oc.style.display = 'none';
}

function stat(label, val) { return '<div class="stat"><div class="stat-label">' + label + '</div><div class="stat-val">' + val + '</div></div>'; }

function initials(name) { return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }

function renderCards() {
  const list = filtered();
  document.getElementById('cards').innerHTML = list.map(f => {
    const sc = FIRM_STATUS[f.status] || FIRM_STATUS['not contacted'];
    const overdue = isOverdue(f);
    const firmLinks = [
      f.website && '<a class="link-btn" href="' + f.website + '" target="_blank">Website</a>',
      f.linkedin && '<a class="link-btn" href="' + f.linkedin + '" target="_blank">LinkedIn</a>',
    ].filter(Boolean).join('');
    const statusOpts = Object.keys(FIRM_STATUS).map(s =>
      '<button class="status-opt ' + (f.status === s ? 'selected' : '') + '" onclick="setFirmStatus(' + f.id + ',\'' + s + '\',this)">' + FIRM_STATUS[s].label + '</button>'
    ).join('');
    const contacts = (f.contacts || []).map(c => renderContact(f.id, c)).join('');
    const followupVal = f.followup_date || '';
    const lastC = f.last_contacted ? '<span style="font-size:12px;color:var(--text3)">Last contacted: ' + f.last_contacted + '</span>' : '';
    return '<div class="card' + (overdue ? ' overdue' : '') + '" id="card-' + f.id + '">' +
      '<div class="card-head" onclick="toggle(' + f.id + ')">' +
        '<div class="firm-top"><span class="firm-name">' + f.name + '</span><span class="tier-badge t' + f.tier + '">Tier ' + f.tier + '</span>' + (overdue ? '<span class="overdue-badge">Follow-up overdue</span>' : '') + '</div>' +
        '<span class="status-badge ' + sc.cls + '" id="fstatus-' + f.id + '">' + sc.label + '</span>' +
        '<span class="chevron" id="chev-' + f.id + '">&#9660;</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + f.id + '">' +
        '<div class="card-section two-col">' +
          '<div><div class="field-label">Why you fit</div><div class="field-val">' + (f.why || '-') + '</div>' + (firmLinks ? '<div class="links">' + firmLinks + '</div>' : '') + '</div>' +
          '<div>' +
            '<div class="field-label">Firm status</div>' +
            '<div class="status-row" id="fstatus-row-' + f.id + '">' + statusOpts + '</div>' +
            '<div class="followup-row"><label>Follow-up date</label><input type="date" value="' + followupVal + '" onchange="saveFollowup(' + f.id + ', this.value)" /></div>' +
            (lastC ? '<div style="margin-top:8px">' + lastC + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="card-section">' +
          '<div class="field-label">Firm notes</div>' +
          '<textarea class="notes-area" id="notes-' + f.id + '" placeholder="Add notes..." onblur="saveFirmNotes(' + f.id + ')">' + (f.notes || '') + '</textarea>' +
        '</div>' +
        '<div class="card-section" id="contacts-section-' + f.id + '">' +
          '<div class="section-label">Contacts</div>' +
          '<div class="contacts-list" id="contacts-list-' + f.id + '">' + contacts + '</div>' +
          '<button class="add-contact-btn" onclick="startAddContact(' + f.id + ')">+ Add contact</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderContact(fid, c) {
  const cs = CONTACT_STATUS[c.status] || CONTACT_STATUS['not contacted'];
  const statusOpts = Object.keys(CONTACT_STATUS).map(s =>
    '<button class="contact-status-opt ' + (c.status === s ? 'selected' : '') + '" onclick="setContactStatus(' + fid + ',' + c.id + ',\'' + s + '\',this)">' + CONTACT_STATUS[s].label + '</button>'
  ).join('');
  const emailLink = c.email ? '<a class="contact-icon-btn" href="mailto:' + c.email + '">Email</a>' : '';
  const liLink = c.linkedin ? '<a class="contact-icon-btn" href="' + c.linkedin + '" target="_blank">LinkedIn</a>' : '';
  return '<div class="contact-row" id="contact-' + fid + '-' + c.id + '">' +
    '<div class="contact-head" onclick="toggleContact(' + fid + ',' + c.id + ')">' +
      '<div class="contact-avatar">' + initials(c.name || '?') + '</div>' +
      '<div class="contact-info"><div class="contact-name">' + (c.name || 'Unknown') + '</div>' +
        (c.title ? '<div class="contact-title">' + c.title + '</div>' : '') +
      '</div>' +
      '<span class="contact-status-badge ' + cs.cls + '">' + cs.label + '</span>' +
      '<div class="contact-actions">' + emailLink + liLink + '</div>' +
    '</div>' +
    '<div class="contact-detail" id="cdetail-' + fid + '-' + c.id + '">' +
      '<div class="contact-detail-grid">' +
        '<div><div class="field-label">Name</div><input class="contact-input" id="cname-' + fid + '-' + c.id + '" value="' + esc(c.name) + '" /></div>' +
        '<div><div class="field-label">Title</div><input class="contact-input" id="ctitle-' + fid + '-' + c.id + '" value="' + esc(c.title) + '" /></div>' +
        '<div><div class="field-label">Email</div><input class="contact-input" id="cemail-' + fid + '-' + c.id + '" value="' + esc(c.email) + '" /></div>' +
        '<div><div class="field-label">LinkedIn</div><input class="contact-input" id="cli-' + fid + '-' + c.id + '" value="' + esc(c.linkedin) + '" /></div>' +
      '</div>' +
      '<div class="field-label" style="margin-top:8px">Status</div>' +
      '<div class="contact-status-row" id="cstatus-row-' + fid + '-' + c.id + '">' + statusOpts + '</div>' +
      '<div class="field-label" style="margin-top:8px">Notes</div>' +
      '<textarea class="contact-notes" id="cnotes-' + fid + '-' + c.id + '">' + esc(c.notes) + '</textarea>' +
      '<div class="contact-detail-actions">' +
        '<button class="btn-save-contact" onclick="saveContact(' + fid + ',' + c.id + ')">Save</button>' +
        '<button class="btn-delete-contact" onclick="removeContact(' + fid + ',' + c.id + ')">Remove</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function esc(v) { return (v || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function toggle(id) { const b = document.getElementById('body-' + id); const c = document.getElementById('chev-' + id); const o = b.classList.toggle('open'); c.classList.toggle('open', o); }
function toggleContact(fid, cid) { document.getElementById('cdetail-' + fid + '-' + cid).classList.toggle('open'); }

function setFirmStatus(id, status, btn) {
  const firm = firms.find(f => f.id === id); if (!firm) return;
  firm.status = status;
  patchFirm(id, { status });
  const sc = FIRM_STATUS[status];
  document.getElementById('fstatus-' + id).className = 'status-badge ' + sc.cls;
  document.getElementById('fstatus-' + id).textContent = sc.label;
  document.getElementById('fstatus-row-' + id).querySelectorAll('.status-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  renderStats();
}

function setContactStatus(fid, cid, status, btn) {
  const firm = firms.find(f => f.id === fid); if (!firm) return;
  const contact = (firm.contacts || []).find(c => c.id === cid); if (!contact) return;
  contact.status = status;
  patchContact(fid, cid, { status });
  const cs = CONTACT_STATUS[status];
  const row = document.getElementById('contact-' + fid + '-' + cid);
  row.querySelector('.contact-status-badge').className = 'contact-status-badge ' + cs.cls;
  row.querySelector('.contact-status-badge').textContent = cs.label;
  document.getElementById('cstatus-row-' + fid + '-' + cid).querySelectorAll('.contact-status-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveFirmNotes(id) { const val = document.getElementById('notes-' + id).value; patchFirm(id, { notes: val }); }
function saveFollowup(id, val) { patchFirm(id, { followup_date: val }); renderStats(); }

async function saveContact(fid, cid) {
  const payload = {
    name: document.getElementById('cname-' + fid + '-' + cid).value,
    title: document.getElementById('ctitle-' + fid + '-' + cid).value,
    email: document.getElementById('cemail-' + fid + '-' + cid).value,
    linkedin: document.getElementById('cli-' + fid + '-' + cid).value,
    notes: document.getElementById('cnotes-' + fid + '-' + cid).value,
  };
  await patchContact(fid, cid, payload);
  const firm = firms.find(f => f.id === fid);
  if (firm) { const c = (firm.contacts || []).find(c => c.id === cid); if (c) Object.assign(c, payload); }
  document.getElementById('cname-' + fid + '-' + cid).closest('.contact-row').querySelector('.contact-name').textContent = payload.name;
  if (payload.title) document.getElementById('cname-' + fid + '-' + cid).closest('.contact-row').querySelector('.contact-title') && (document.getElementById('cname-' + fid + '-' + cid).closest('.contact-row').querySelector('.contact-title').textContent = payload.title);
}

async function removeContact(fid, cid) {
  if (!confirm('Remove this contact?')) return;
  await deleteContact(fid, cid);
  const firm = firms.find(f => f.id === fid);
  if (firm) firm.contacts = (firm.contacts || []).filter(c => c.id !== cid);
  document.getElementById('contact-' + fid + '-' + cid).remove();
  renderStats();
}

async function startAddContact(fid) {
  const name = prompt('Contact name:'); if (!name) return;
  const title = prompt('Title (optional):') || '';
  const email = prompt('Email (optional):') || '';
  const linkedin = prompt('LinkedIn URL (optional):') || '';
  const contact = await addContact(fid, { name, title, email, linkedin, status: 'not contacted', notes: '' });
  const firm = firms.find(f => f.id === fid);
  if (firm) firm.contacts = [...(firm.contacts || []), contact];
  const list = document.getElementById('contacts-list-' + fid);
  const div = document.createElement('div');
  div.innerHTML = renderContact(fid, contact);
  list.appendChild(div.firstChild);
  renderStats();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('m-name').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function addFirm() {
  const name = document.getElementById('m-name').value.trim(); if (!name) return;
  const body = { name, tier: parseInt(document.getElementById('m-tier').value), why: document.getElementById('m-why').value.trim(), website: document.getElementById('m-website').value.trim(), linkedin: document.getElementById('m-linkedin').value.trim() };
  const r = await fetch('/api/firms', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
  const firm = await r.json();
  firms.push(firm);
  closeModal();
  render();
  ['m-name', 'm-why', 'm-website', 'm-linkedin'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-tier').value = '3';
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('import-modal').addEventListener('click', e => { if (e.target === document.getElementById('import-modal')) closeImport(); });

function exportCSV() { window.location = '/api/export.csv?token=' + authToken; }
function openImport() { document.getElementById('import-modal').classList.add('open'); document.getElementById('import-result').style.display = 'none'; }
function closeImport() { document.getElementById('import-modal').classList.remove('open'); document.getElementById('import-text').value = ''; }

async function doImport() {
  const raw = document.getElementById('import-text').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return;
  const headers = parseCSVLine(lines[0]);
  const rows = lines.slice(1).map(line => { const vals = parseCSVLine(line); const obj = {}; headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); }); return obj; }).filter(r => r.name);
  const r = await fetch('/api/import', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ rows }) });
  const result = await r.json();
  await load();
  const el = document.getElementById('import-result');
  el.style.display = 'block';
  el.textContent = 'Done. ' + result.added + ' added, ' + result.updated + ' updated.';
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

init();
</script>
