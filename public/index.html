<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HopeSpot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F7FA;color:#1F2D3D;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#1F2D3D}
.logo svg{color:#F97316}
.tabs{display:flex;gap:0;border-bottom:2px solid #E5E7EB;margin:0 24px;margin-top:16px}
.tab{padding:10px 20px;font-size:14px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1F2D3D}
.tab.active{color:#F97316;border-bottom-color:#F97316;font-weight:600}
.tab .badge{display:inline-block;background:#F97316;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:6px}
.tab .badge.green{background:#10B981}
.tab .badge.blue{background:#3B82F6}
.main{padding:20px 24px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-box{flex:1;min-width:180px;padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none}
.search-box:focus{border-color:#F97316}
.filter-btn{padding:6px 12px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;font-size:12px;cursor:pointer;color:#6B7280;transition:all .15s}
.filter-btn.active,.filter-btn:hover{background:#FFF7ED;color:#F97316;border-color:#F97316}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #E5E7EB}
.stat-label{font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;color:#1F2D3D}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.tier-badge{background:#F3F4F6;color:#6B7280;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:.04em}
.card-name{font-size:14px;font-weight:600;flex:1}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-contacted{background:#3B82F6}
.dot-in-conversation{background:#10B981}
.dot-not-contacted{background:#D1D5DB}
.dot-passed{background:#EF4444}
.dot-bounced{background:#F59E0B}
.status-label{font-size:12px;color:#9CA3AF}
.card-body{padding:0 16px 14px;border-top:1px solid #F3F4F6;display:none}
.card-body.open{display:block}
.why{font-size:12px;color:#6B7280;margin:10px 0 8px;line-height:1.5}
.contacts-section{margin-top:10px}
.contact-row{display:flex;align-items:flex-start;gap:10px;padding:8px;background:#F9FAFB;border-radius:6px;margin-bottom:6px;font-size:12px}
.contact-info{flex:1}
.contact-name{font-weight:600;color:#1F2D3D;margin-bottom:2px}
.contact-title{color:#9CA3AF;margin-bottom:3px}
.contact-email{color:#F97316;font-family:monospace;font-size:11px}
.contact-notes{color:#6B7280;font-size:11px;margin-top:3px;font-style:italic}
.contact-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#EFF6FF;color:#3B82F6;white-space:nowrap}
.contact-status.bounced{background:#FEF3C7;color:#D97706}
.contact-status.dead-end{background:#FEE2E2;color:#EF4444}
.contact-status.in-conversation{background:#ECFDF5;color:#10B981}
.notes-row{display:flex;gap:8px;align-items:flex-start;margin-top:8px}
.notes-input{flex:1;padding:6px 10px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;min-height:52px;resize:vertical;font-family:inherit;outline:none}
.notes-input:focus{border-color:#F97316}
.status-select{padding:5px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;outline:none;background:#fff}
.followup-input{padding:5px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;outline:none}
.save-btn{padding:5px 12px;background:#F97316;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.save-btn:hover{background:#ea6c06}
.empty{text-align:center;padding:60px 20px;color:#9CA3AF}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:12px;padding:36px;max-width:380px;width:100%;border:1px solid #E5E7EB;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;color:#1F2D3D}
.login-sub{font-size:13px;color:#9CA3AF;margin-bottom:24px}
.login-input{width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px}
.login-input:focus{border-color:#F97316}
.login-btn{width:100%;padding:10px;background:#F97316;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-error{color:#EF4444;font-size:12px;margin-top:8px;display:none}
.section-label{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
</style>
</head>
<body>
<div id="login-view" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-title">HopeSpot</div>
    <div class="login-sub">Could've used HubSpot.</div>
    <input class="login-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error">Incorrect password. The irony of being locked out of your own job search tool is noted.</div>
  </div>
</div>

<div id="app-view" style="display:none">
  <div class="topbar">
    <div class="logo">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      HopeSpot
    </div>
    <div style="font-size:11px;color:#9CA3AF">Built instead of applying.</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-recruiters" onclick="switchTab('recruiters')">Recruiters <span class="badge" id="badge-recruiters">0</span></div>
    <div class="tab" id="tab-ceos" onclick="switchTab('ceos')">Direct CEO <span class="badge blue" id="badge-ceos">0</span></div>
    <div class="tab" id="tab-vcs" onclick="switchTab('vcs')">VC Firms <span class="badge green" id="badge-vcs">0</span></div>
  </div>

  <div class="main">
    <div class="controls">
      <input class="search-box" type="text" id="search-input" placeholder="Search..." oninput="render()">
      <button class="filter-btn active" id="fAll" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="fActive" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" id="fContacted" onclick="setFilter('contacted',this)">Contacted</button>
      <button class="filter-btn" id="fNot" onclick="setFilter('not contacted',this)">Not contacted</button>
      <button class="filter-btn" id="fBounced" onclick="setFilter('bounced',this)">Bounced</button>
      <button class="filter-btn" id="fPassed" onclick="setFilter('passed',this)">Passed</button>
    </div>

    <div class="stats" id="stats-row"></div>
    <div class="cards" id="cards-container"></div>
  </div>
</div>

<script>
let TOKEN = '';
let DATA = [];
let CEOs = [];
let VCs = [];
let FILTER = 'all';
let TAB = 'recruiters';

async function init() {
  const r = await fetch('/api/auth-required').then(x=>x.json());
  if (!r.required) { TOKEN='no-auth'; await loadAll(); showApp(); }
  else document.getElementById('login-view').style.display='flex';
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(x=>x.json());
  if (r.ok) { TOKEN=r.token; await loadAll(); showApp(); document.getElementById('login-view').style.display='none'; }
  else document.getElementById('login-error').style.display='block';
}

async function loadAll() {
  const h = {'x-auth-token':TOKEN};
  [DATA, CEOs, VCs] = await Promise.all([
    fetch('/api/firms',{headers:h}).then(x=>x.json()),
    fetch('/api/ceos',{headers:h}).then(x=>x.json()),
    fetch('/api/vcs',{headers:h}).then(x=>x.json())
  ]);
  updateBadges();
  render();
}

function showApp() {
  document.getElementById('app-view').style.display='block';
}

function updateBadges() {
  const active = d => d.filter(x=>['contacted','in conversation'].includes(x.status)).length;
  document.getElementById('badge-recruiters').textContent = active(DATA);
  document.getElementById('badge-ceos').textContent = active(CEOs);
  document.getElementById('badge-vcs').textContent = active(VCs);
}

function switchTab(t) {
  TAB = t;
  ['recruiters','ceos','vcs'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  FILTER='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fAll').classList.add('active');
  document.getElementById('search-input').value='';
  render();
}

function currentData() {
  if (TAB==='ceos') return CEOs;
  if (TAB==='vcs') return VCs;
  return DATA;
}

function nameField(item) {
  if (TAB==='ceos') return item.company;
  if (TAB==='vcs') return item.firm;
  return item.name;
}

function setFilter(f,btn) {
  FILTER=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let items = currentData();

  if (FILTER==='active') items=items.filter(x=>['contacted','in conversation'].includes(x.status));
  else if (FILTER==='bounced') items=items.filter(x=>x.status==='bounced'||(x.contacts||[]).some(c=>c.status==='bounced'));
  else if (FILTER!=='all') items=items.filter(x=>x.status===FILTER);

  if (q) items=items.filter(x=>{
    const name=nameField(x).toLowerCase();
    return name.includes(q)||(x.why||'').toLowerCase().includes(q)||(x.notes||'').toLowerCase().includes(q)||
      (x.contacts||[]).some(c=>(c.name||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q));
  });

  // Stats
  const all = currentData();
  const contacted = all.filter(x=>x.status==='contacted').length;
  const conv = all.filter(x=>x.status==='in conversation').length;
  const notC = all.filter(x=>x.status==='not contacted').length;
  const bounced = all.filter(x=>x.status==='bounced'||(x.contacts||[]).some(c=>c.status==='bounced')).length;
  document.getElementById('stats-row').innerHTML=
    `<div class="stat"><div class="stat-label">Total</div><div class="stat-val">${all.length}</div></div>`+
    `<div class="stat"><div class="stat-label">Active</div><div class="stat-val">${contacted+conv}</div></div>`+
    `<div class="stat"><div class="stat-label">In Conversation</div><div class="stat-val">${conv}</div></div>`+
    `<div class="stat"><div class="stat-label">Not Contacted</div><div class="stat-val">${notC}</div></div>`+
    `<div class="stat"><div class="stat-label">Bounced</div><div class="stat-val">${bounced}</div></div>`;

  const container = document.getElementById('cards-container');
  if (!items.length) { container.innerHTML='<div class="empty">No results.</div>'; return; }

  container.innerHTML = items.map(item=>{
    const id=item.id;
    const name=nameField(item);
    const statusClass='dot-'+(item.status||'not-contacted').replace(' ','-');
    const statusLabel=(item.status||'not contacted');
    const tier=item.tier?`<span class="tier-badge">T${item.tier}</span>`:
      (TAB==='ceos'?'<span class="tier-badge">CEO</span>':'<span class="tier-badge">VC</span>');

    const contacts=(item.contacts||[]).map(c=>{
      const cs=(c.status||'').replace(' ','-');
      return `<div class="contact-row">
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          ${c.title?`<div class="contact-title">${c.title}</div>`:''}
          ${c.email?`<div class="contact-email">${c.email}</div>`:''}
          ${c.notes?`<div class="contact-notes">${c.notes}</div>`:''}
        </div>
        <span class="contact-status ${cs}">${c.status||'not contacted'}</span>
      </div>`;
    }).join('');

    return `<div class="card" id="card-${TAB}-${id}">
      <div class="card-header" onclick="toggle('${TAB}',${id})">
        ${tier}
        <div class="card-name">${name}</div>
        <span class="status-label">${statusLabel}</span>
        <span class="status-dot ${statusClass}"></span>
      </div>
      <div class="card-body" id="body-${TAB}-${id}">
        <div class="why">${item.why||''}</div>
        ${contacts?`<div class="section-label">Contacts</div><div class="contacts-section">${contacts}</div>`:''}
        <div class="section-label" style="margin-top:12px">Notes & Status</div>
        <div class="notes-row">
          <textarea class="notes-input" id="notes-${TAB}-${id}">${item.notes||''}</textarea>
          <div style="display:flex;flex-direction:column;gap:6px">
            <select class="status-select" id="status-${TAB}-${id}">
              <option value="not contacted" ${item.status==='not contacted'?'selected':''}>Not contacted</option>
              <option value="contacted" ${item.status==='contacted'?'selected':''}>Contacted</option>
              <option value="in conversation" ${item.status==='in conversation'?'selected':''}>In conversation</option>
              <option value="bounced" ${item.status==='bounced'?'selected':''}>Bounced</option>
              <option value="passed" ${item.status==='passed'?'selected':''}>Passed</option>
            </select>
            <input class="followup-input" type="date" id="followup-${TAB}-${id}" value="${item.followup_date||''}">
            <button class="save-btn" onclick="save('${TAB}',${id})">Save</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(tab, id) {
  const body = document.getElementById(`body-${tab}-${id}`);
  if (body) body.classList.toggle('open');
}

async function save(tab, id) {
  const notes=document.getElementById(`notes-${tab}-${id}`).value;
  const status=document.getElementById(`status-${tab}-${id}`).value;
  const followup=document.getElementById(`followup-${tab}-${id}`).value;
  const endpoint = tab==='ceos'?'/api/ceos':tab==='vcs'?'/api/vcs':'/api/firms';
  await fetch(`${endpoint}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','x-auth-token':TOKEN},body:JSON.stringify({notes,status,followup_date:followup||null})});
  await loadAll();
}

document.addEventListener('keydown',e=>{
  if ((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus();}
});

init();
</script>
</body>
</html>
